services:
  postgres:
    image: postgres:16-alpine
    container_name: redayuda-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: redayuda
      POSTGRES_PASSWORD: redayuda
      POSTGRES_DB: redayuda
    volumes:
      - redayuda_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redayuda -d redayuda"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  redayuda_pgdata:
